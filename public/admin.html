<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Personal Tracker</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="app-shell">
  <nav class="top-nav" id="top-nav"></nav>
  <div class="page-content">
    <div class="container">
      <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:28px">Admin Dashboard</h1>

      <div class="grid-2" style="margin-bottom:28px">
        <!-- Users Card -->
        <div class="card">
          <div class="card-title" style="margin-bottom:16px">👥 Registered Users</div>
          <div id="users-list" style="max-height:200px;overflow-y:auto"></div>
        </div>

        <!-- Global Dashboard Selector -->
        <div class="card">
          <div class="card-title" style="margin-bottom:16px">📊 Live Dashboard (All Users)</div>
          <p style="color:var(--text-dim);font-size:.82rem;margin-bottom:16px">
            Select a date to view aggregated real-time telemetry across all users on the platform.
          </p>
          <div class="form-group">
            <label class="form-label" for="dash-date">Select Date</label>
            <input class="form-input" type="date" id="dash-date">
          </div>
        </div>
      </div>

      <!-- Dashboard Table -->
      <div class="card" id="dashboard-card" style="display:none;">
        <div class="table-wrap" style="max-height:500px;overflow-y:auto">
          <table class="data-table" style="min-width: 800px;">
            <thead>
              <tr id="dash-head"></tr>
            </thead>
            <tbody id="dash-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/js/utils.js"></script>
<script>
let currentUser = null;
(async () => {
  currentUser = await requireLogin();
  if (!currentUser) return;
  buildNav(currentUser, 'admin');
  document.getElementById('dash-date').value = getTodayISO();
  document.getElementById('dash-date').addEventListener('change', loadAdminDashboard);

  await Promise.all([loadUsers(), loadAdminDashboard()]);
})();

async function loadUsers() {
  try {
    const data = await api('/api/users');
    const container = document.getElementById('users-list');
    if (!data.users || data.users.length === 0) {
      container.innerHTML = '<p style="color:var(--text-muted);font-size:.82rem">No users</p>';
      return;
    }
    container.innerHTML = data.users.map(u => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:.85rem;font-weight:600">${escapeHTML(u.display_name)}</div>
          <div style="font-size:.72rem;color:var(--text-muted)">${escapeHTML(u.email)}</div>
        </div>
        <span class="badge ${u.role === 'admin' ? 'badge-return' : 'badge-fresh'}">${u.role}</span>
      </div>
    `).join('');
  } catch { showToast('Failed to load users', 'error'); }
}

async function loadAdminDashboard() {
  const date = document.getElementById('dash-date').value;
  if (!date) return;
  try {
    const data = await api(`/api/admin/dashboard?date=${date}`);
    document.getElementById('dashboard-card').style.display = 'block';
    
    // Build Headers
    let headHtml = `<th>Annotator</th>`;
    for(let i=1; i<=data.maxSlots; i++) headHtml += `<th>Slot ${i}</th>`;
    headHtml += `<th>Total Fresh</th><th>Total Returns</th><th>Quality</th>`;
    document.getElementById('dash-head').innerHTML = headHtml;

    // Build Rows
    if (!data.users || data.users.length === 0) {
      document.getElementById('dash-body').innerHTML = `<tr><td colspan="${data.maxSlots + 4}" style="text-align:center;padding:32px;color:var(--text-muted)">No activity for this date</td></tr>`;
      return;
    }

    const rows = data.users.map(u => {
      let cells = `<td>
        <div style="font-weight:600">${escapeHTML(u.displayName)}</div>
        <div style="font-size:.72rem;color:var(--text-muted)">${escapeHTML(u.email)}</div>
      </td>`;
      for(let i=0; i<data.maxSlots; i++) {
        const f = u.slots.fresh[i] || 0;
        const r = u.slots.return[i] || 0;
        if(f===0 && r===0) {
          cells += `<td style="color:var(--text-muted)">-</td>`;
        } else {
          cells += `<td>
            <div style="color:var(--fresh)">F: ${f}</div>
            <div style="color:var(--return)">R: ${r}</div>
          </td>`;
        }
      }
      cells += `
        <td style="color:var(--fresh);font-weight:600">${u.totalFresh}</td>
        <td style="color:var(--return);font-weight:600">${u.totalReturn}</td>
        <td>
          <div class="progress-bar"><div class="progress-fill" style="width:${u.quality}%"></div></div>
          <div style="font-size:0.7rem;text-align:right;margin-top:4px">${u.quality}%</div>
        </td>`;
      return `<tr>${cells}</tr>`;
    }).join('');
    
    document.getElementById('dash-body').innerHTML = rows;
  } catch(err) {
    showToast('Failed to load global dashboard', 'error');
  }
}
</script>
</body>
</html>
