services:
  tracker:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgresql://tracker_user:tracker_password@postgres:5432/tracker}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production-please}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@tracker.pro}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ChangeMe123!}
      - GOOGLE_SHEETS_ENABLED=${GOOGLE_SHEETS_ENABLED:-false}
    volumes:
      - tracker-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-tracker}
      - POSTGRES_USER=${POSTGRES_USER:-tracker_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tracker_password}
    volumes:
      - tracker-postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tracker-data:
  tracker-postgres:
